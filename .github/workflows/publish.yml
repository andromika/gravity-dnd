name: Publish gravity-dnd package

on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish to npm + GitHub Packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint/build tests
        run: npm run lint

      - name: Publish to npmjs.org
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "Publishing gravity-dnd to npmjs.org"
          npm config set registry https://registry.npmjs.org/
          npm config set @polestarlabs:registry https://registry.npmjs.org/
          npm publish --access public

      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Publishing gravity-dnd to GitHub Packages"
          npm config set registry https://npm.pkg.github.com/
          npm config set @polestarlabs:registry https://npm.pkg.github.com/
          npm publish --registry https://npm.pkg.github.com/ --access public
