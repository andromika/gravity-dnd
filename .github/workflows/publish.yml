name: Publish gravity-dnd package

on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish to npm + GitHub Packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint/build tests
        run: npm run lint

      - name: Login to npm via OIDC trusted publisher
        run: |
          echo "Logging into npm using OIDC (trusted publisher)"
          echo "registry=https://registry.npmjs.org/" > ~/.npmrc
          npm login --auth-type=oidc --registry=https://registry.npmjs.org/ --always-auth

      - name: Publish to npmjs.org
        run: |
          echo "Publishing gravity-dnd to npmjs.org"
          npm publish --access public || echo "npm publish may have failed; continuing to GitHub Packages"

      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Publishing gravity-dnd to GitHub Packages"
          npm config set registry https://npm.pkg.github.com/
          echo "//npm.pkg.github.com/:_authToken=$NODE_AUTH_TOKEN" > ~/.npmrc
          npm publish --registry https://npm.pkg.github.com/ --access public


